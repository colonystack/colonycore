openapi: 3.1.0
info:
  title: ColonyCore Dataset Service
  version: 0.1.0
  description: >-
    Species-agnostic analytics API exposing registered, versioned dataset templates as
    described in RFC 0001 (sections 6.3 and 7).
servers:
  - url: https://api.colonycore.local
    description: Example deployment host
paths:
  /api/v1/datasets/templates:
    get:
      summary: List dataset templates
      description: >-
        Enumerates registered dataset templates including schema, metadata, and supported formats.
        Results are filtered by token-derived project/protocol scope exposed through dataset scope headers,
        then paginated after filtering.
      tags: [datasets]
      parameters:
        - $ref: '#/components/parameters/DatasetRequestorHeader'
        - $ref: '#/components/parameters/DatasetRolesHeader'
        - $ref: '#/components/parameters/DatasetProjectIDsHeader'
        - $ref: '#/components/parameters/DatasetProtocolIDsHeader'
        - in: query
          name: page
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: One-based page number applied after RBAC filtering.
        - in: query
          name: page_size
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 50
          description: Number of templates returned per page.
      responses:
        '200':
          description: Templates enumerated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetTemplateDescriptor'
                  pagination:
                    $ref: '#/components/schemas/DatasetTemplatePagination'
                required: [templates, pagination]
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/datasets/templates/{plugin}/{key}/{version}:
    parameters:
      - $ref: '#/components/parameters/Plugin'
      - $ref: '#/components/parameters/TemplateKey'
      - $ref: '#/components/parameters/TemplateVersion'
    get:
      summary: Fetch dataset template
      tags: [datasets]
      responses:
        '200':
          description: Template metadata returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/DatasetTemplateDescriptor'
                required: [template]
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/datasets/templates/{plugin}/{key}/{version}/validate:
    parameters:
      - $ref: '#/components/parameters/Plugin'
      - $ref: '#/components/parameters/TemplateKey'
      - $ref: '#/components/parameters/TemplateVersion'
    post:
      summary: Validate dataset parameters
      tags: [datasets]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters:
                  type: object
                  additionalProperties: {}
      responses:
        '200':
          description: Parameters validated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/DatasetTemplateDescriptor'
                  valid:
                    type: boolean
                  parameters:
                    type: object
                    additionalProperties: {}
                required: [template, valid, parameters]
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/datasets/templates/{plugin}/{key}/{version}/run:
    parameters:
      - $ref: '#/components/parameters/Plugin'
      - $ref: '#/components/parameters/TemplateKey'
      - $ref: '#/components/parameters/TemplateVersion'
      - in: query
        name: format
        schema:
          type: string
          enum: [json, csv]
        description: Preferred response format. Defaults to JSON unless the Accept header contains text/csv.
    post:
      summary: Execute dataset template
      description: >-
        Streams dataset rows using JSON (default) or CSV transport while applying RBAC scope filters.
        CSV responses adhere to RFC 4180; JSON payloads include schema, metadata with units, and generation timestamp.
      tags: [datasets]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters:
                  type: object
                  additionalProperties: {}
                scope:
                  $ref: '#/components/schemas/DatasetScope'
      responses:
        '200':
          description: Dataset rendered successfully.
          headers:
            Transfer-Encoding:
              description: Present for streamed CSV responses and set to `chunked`.
              schema:
                type: string
            Trailer:
              description: >-
                Comma-separated list of HTTP trailer field names declared for chunked CSV
                responses. The server always declares `X-Stream-Error` and may also declare
                `X-Progress` when byte progress metadata is available, for example
                `X-Stream-Error, X-Progress`.
              schema:
                type: string
                pattern: '^[A-Za-z0-9-]+(?:,\s*[A-Za-z0-9-]+)*$'
                example: X-Stream-Error, X-Progress
            X-Progress:
              description: >-
                Progress metadata for streamed CSV responses. The initial header is emitted as
                `bytes=0/<total>` and the final `bytes=<written>/<total>` value is emitted as an
                HTTP trailer when chunked transfer encoding is used.
              schema:
                type: string
            X-Stream-Error:
              description: Failure trailer emitted when a chunked CSV stream terminates early.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/DatasetTemplateDescriptor'
                  scope:
                    $ref: '#/components/schemas/DatasetScope'
                  parameters:
                    type: object
                    additionalProperties: {}
                  result:
                    $ref: '#/components/schemas/DatasetRunResult'
                required: [template, scope, parameters, result]
            text/csv:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/datasets/exports:
    post:
      summary: Queue dataset export
      description: >-
        Enqueues an asynchronous export job that renders the requested dataset template across one or more
        formats. Export artifacts are stored in the managed object store and linked to the caller.
      tags: [datasets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportCreateRequest'
      responses:
        '202':
          description: Export queued successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: '#/components/schemas/ExportRecord'
                required: [export]
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/datasets/exports/{exportId}:
    parameters:
      - in: path
        name: exportId
        schema:
          type: string
        required: true
        description: Identifier of the export job.
    get:
      summary: Fetch export status
      tags: [datasets]
      responses:
        '200':
          description: Export status returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: '#/components/schemas/ExportRecord'
                required: [export]
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    Plugin:
      name: plugin
      in: path
      required: true
      schema:
        type: string
      description: Plugin identifier registering the template.
    TemplateKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Dataset template key within the plugin namespace.
    TemplateVersion:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Semantic version of the dataset template.
    DatasetRequestorHeader:
      name: X-Dataset-Requestor
      in: header
      required: false
      schema:
        type: string
      description: Requestor identity propagated from upstream authentication middleware.
    DatasetRolesHeader:
      name: X-Dataset-Roles
      in: header
      required: false
      schema:
        type: string
      description: Comma-delimited RBAC roles propagated from upstream authentication middleware.
    DatasetProjectIDsHeader:
      name: X-Dataset-Project-Ids
      in: header
      required: false
      schema:
        type: string
      description: Comma-delimited project IDs allowed by the caller's scoped token.
    DatasetProtocolIDsHeader:
      name: X-Dataset-Protocol-Ids
      in: header
      required: false
      schema:
        type: string
      description: Comma-delimited protocol IDs allowed by the caller's scoped token.
  responses:
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    BadRequest:
      description: Malformed request payload.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    UnprocessableEntity:
      description: Request semantic validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    MethodNotAllowed:
      description: Method not allowed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotAcceptable:
      description: Requested format not supported by the dataset template.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    InternalError:
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/DatasetParameterError'
      required: [type, title, status, detail]
    DatasetTemplateDescriptor:
      type: object
      properties:
        plugin:
          type: string
        key:
          type: string
        version:
          type: string
        title:
          type: string
        description:
          type: string
        dialect:
          type: string
          enum: [sql, dsl]
        query:
          type: string
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/DatasetParameter'
        columns:
          type: array
          items:
            $ref: '#/components/schemas/DatasetColumn'
        metadata:
          $ref: '#/components/schemas/DatasetMetadata'
        output_formats:
          type: array
          items:
            type: string
            enum: [json, csv, parquet, png, html]
        slug:
          type: string
      required: [plugin, key, version, title, description, dialect, query, columns, output_formats, slug]
    DatasetTemplatePagination:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
        page_size:
          type: integer
          format: int32
          minimum: 1
        total_items:
          type: integer
          format: int32
          minimum: 0
        total_pages:
          type: integer
          format: int32
          minimum: 0
        has_next:
          type: boolean
        has_prev:
          type: boolean
      required: [page, page_size, total_items, total_pages, has_next, has_prev]
    DatasetParameter:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, integer, number, boolean, timestamp]
        required:
          type: boolean
          default: false
        description:
          type: string
        unit:
          type: string
        enum:
          type: array
          items:
            type: string
        example:
          nullable: true
        default:
          nullable: true
      required: [name, type]
    DatasetColumn:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        unit:
          type: string
          description: Canonical unit (SI / ISO 80000 where applicable).
        description:
          type: string
        format:
          type: string
      required: [name, type]
    DatasetMetadata:
      type: object
      properties:
        source:
          type: string
        documentation:
          type: string
          format: uri-reference
        refresh_interval:
          type: string
          description: ISO-8601 duration for recommended refresh cadence.
        tags:
          type: array
          items:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string
    DatasetScope:
      type: object
      properties:
        requestor:
          type: string
        roles:
          type: array
          items:
            type: string
        project_ids:
          type: array
          items:
            type: string
        protocol_ids:
          type: array
          items:
            type: string
      description: RBAC-derived filters applied to dataset execution.
    DatasetRunResult:
      type: object
      properties:
        schema:
          type: array
          items:
            $ref: '#/components/schemas/DatasetColumn'
        rows:
          type: array
          items:
            type: object
            additionalProperties: {}
        metadata:
          type: object
          additionalProperties: {}
        generated_at:
          type: string
          format: date-time
        format:
          type: string
          enum: [json, csv, parquet, png, html]
      required: [rows, generated_at, format]
    DatasetParameterError:
      type: object
      properties:
        name:
          type: string
        message:
          type: string
      required: [name, message]
    ExportCreateRequest:
      type: object
      properties:
        template:
          type: object
          properties:
            slug:
              type: string
            plugin:
              type: string
            key:
              type: string
            version:
              type: string
          description: Template selector; either slug or plugin/key/version must be provided.
        parameters:
          type: object
          additionalProperties: {}
        formats:
          type: array
          items:
            type: string
            enum: [json, csv, parquet, png, html]
        scope:
          $ref: '#/components/schemas/DatasetScope'
        requested_by:
          type: string
        reason:
          type: string
        project_id:
          type: string
        protocol_id:
          type: string
      required: [template]
    ExportRecord:
      type: object
      properties:
        id:
          type: string
        template:
          $ref: '#/components/schemas/DatasetTemplateDescriptor'
        scope:
          $ref: '#/components/schemas/DatasetScope'
        parameters:
          type: object
          additionalProperties: {}
        formats:
          type: array
          items:
            type: string
            enum: [json, csv, parquet, png, html]
        status:
          $ref: '#/components/schemas/ExportStatus'
        progress_pct:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        eta_seconds:
          type: integer
          format: int32
          minimum: 0
          nullable: true
        progress_state:
          $ref: '#/components/schemas/ExportProgressState'
        artifact_readiness:
          $ref: '#/components/schemas/ExportArtifactReadiness'
        error:
          type: string
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ExportArtifact'
        requested_by:
          type: string
        reason:
          type: string
        project_id:
          type: string
        protocol_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
      required: [id, template, scope, formats, status, progress_pct, eta_seconds, progress_state, artifact_readiness, requested_by, created_at, updated_at]
    ExportArtifact:
      type: object
      properties:
        id:
          type: string
        format:
          type: string
          enum: [json, csv, parquet, png, html]
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: {}
        created_at:
          type: string
          format: date-time
      required: [id, format, content_type, size_bytes, url, created_at]
    ExportStatus:
      type: string
      enum: [queued, running, succeeded, failed]
    ExportProgressState:
      type: string
      enum: [queued, validating_parameters, executing_template, materializing_artifacts, completed, failed]
    ExportArtifactReadiness:
      type: string
      enum: [pending, partial, ready, unavailable]
